name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Python (secrets + config + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Secret scan
        run: python scripts/check_secrets.py
      - name: Release config check
        run: python scripts/check_release_config.py
      - name: Test
        run: pytest -q

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deniz_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: pub get
        run: flutter pub get
      - name: analyze
        run: flutter analyze
      - name: test
        run: flutter test
