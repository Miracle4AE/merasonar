name: Release Build
# Tag push v1.0.0-rc1 (or v*) triggers this workflow; or use workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      skip_qa:
        description: "Skip QA gates (not recommended)"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"
      - "*-rc*"

jobs:
  qa:
    name: QA gates
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_qa == false }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Secret scan
        run: python scripts/check_secrets.py
      - name: Release config check
        run: python scripts/check_release_config.py
      - name: pytest
        run: pytest -q
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter analyze + test
        working-directory: deniz_app
        run: |
          flutter pub get
          flutter analyze
          flutter test

  build-android:
    name: Android APK (release)
    runs-on: ubuntu-latest
    needs: [qa]
    if: always() && (needs.qa.result == 'success' || needs.qa.result == 'skipped')
    defaults:
      run:
        working-directory: deniz_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: pub get
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Artifact sanity check
        working-directory: ${{ github.workspace }}
        run: |
          python scripts/check_release_artifacts.py \
            --apk deniz_app/build/app/outputs/flutter-apk/app-release.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MeraSonar-android-apk
          path: deniz_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-windows:
    name: Windows (release)
    runs-on: windows-latest
    needs: [qa]
    if: always() && (needs.qa.result == 'success' || needs.qa.result == 'skipped')
    defaults:
      run:
        working-directory: deniz_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: pub get
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Zip Windows release
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release"
          if (-not (Test-Path $src)) { throw "Missing $src" }
          Compress-Archive -Path "$src/*" -DestinationPath "MeraSonar-windows-release.zip" -Force
      - name: Artifact sanity check
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          python scripts/check_release_artifacts.py \
            --windows-dir deniz_app/build/windows/x64/runner/Release \
            --windows-zip deniz_app/MeraSonar-windows-release.zip
      - name: Upload Windows folder
        uses: actions/upload-artifact@v4
        with:
          name: MeraSonar-windows-release
          path: deniz_app/build/windows/x64/runner/Release/
          if-no-files-found: error
      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: MeraSonar-windows-release-zip
          path: deniz_app/MeraSonar-windows-release.zip
          if-no-files-found: error
